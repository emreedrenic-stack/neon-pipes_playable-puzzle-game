<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Neon Pipes v1.4</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* Inlined style.css */
        :root {
            --bg-color: #050510;
            --grid-bg: #1a1a2e;
            --pipe-off: #33334d;
            --pipe-on: #00f3ff;
            /* Cyan Neon */
            --source-color: #ff00ff;
            /* Magenta */
            --sink-color: #00ff66;
            /* Neon Green */
            --msg-error: #ff3333;
            /* Red for game over */
            --text-color: #ffffff;
            --medal-gold: #ffd700;
            --medal-silver: #c0c0c0;
            --medal-bronze: #cd7f32;
            --font-main: 'Outfit', sans-serif;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #app {
            width: 100%;
            max-width: 600px;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            padding: 20px;
        }

        /* Header / HUD */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            flex: 0 0 auto;
        }

        h1 {
            font-size: 1.5rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 243, 255, 0.5);
        }

        .hud-group {
            display: flex;
            gap: 10px;
        }

        .level-indicator {
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            min-width: 80px;
            text-align: center;
        }

        .moves-indicator {
            color: var(--text-color);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .moves-low {
            color: var(--msg-error);
            border-color: var(--msg-error);
            box-shadow: 0 0 10px rgba(255, 51, 51, 0.3);
            animation: pulse-red 1s infinite;
        }

        @keyframes pulse-red {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }

            100% {
                transform: scale(1);
            }
        }

        /* Game Board */
        #game-container {
            flex: 1 1 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        #grid {
            display: grid;
            gap: 5px;
            background-color: var(--grid-bg);
            padding: 10px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            aspect-ratio: 1 / 1;
            width: 100%;
            max-width: 500px;
            max-height: 500px;
        }

        /* Tiles */
        .tile {
            position: relative;
            background-color: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tile.fixed {
            cursor: default;
        }

        /* Inner Pipe Drawing (CSS Shapes) */
        .pipe-part {
            position: absolute;
            background-color: var(--pipe-off);
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
            z-index: 1;
        }

        /* Center hub for connectivity */
        .pipe-center {
            width: 30%;
            height: 30%;
            border-radius: 50%;
            z-index: 2;
        }

        /* Arms */
        .arm-top {
            width: 20%;
            height: 50%;
            top: 0;
            left: 40%;
        }

        .arm-right {
            width: 50%;
            height: 20%;
            top: 40%;
            right: 0;
        }

        .arm-bottom {
            width: 20%;
            height: 50%;
            bottom: 0;
            left: 40%;
        }

        .arm-left {
            width: 50%;
            height: 20%;
            top: 40%;
            left: 0;
        }

        /* Active State */
        .tile.active .pipe-part,
        .tile.active .pipe-center {
            background-color: var(--pipe-on);
            box-shadow: 0 0 10px var(--pipe-on);
        }

        .tile.source .pipe-part,
        .tile.source .pipe-center {
            background-color: var(--source-color);
            box-shadow: 0 0 15px var(--source-color);
        }

        .tile.sink .pipe-part,
        .tile.sink .pipe-center {
            background-color: var(--sink-color);
            box-shadow: 0 0 15px var(--sink-color);
        }

        /* UI Modals */
        .modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 16, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            padding: 20px;
            text-align: center;
        }

        .modal.visible {
            opacity: 1;
            pointer-events: all;
        }

        .medal-icon {
            font-size: 3rem;
            margin: 10px 0;
        }

        .medal-gold {
            color: var(--medal-gold);
            text-shadow: 0 0 20px var(--medal-gold);
        }

        .medal-silver {
            color: var(--medal-silver);
            text-shadow: 0 0 15px var(--medal-silver);
        }

        .medal-bronze {
            color: var(--medal-bronze);
            text-shadow: 0 0 10px var(--medal-bronze);
        }

        .btn {
            background: transparent;
            color: var(--pipe-on);
            border: 2px solid var(--pipe-on);
            padding: 15px 40px;
            font-size: 1.2rem;
            font-family: inherit;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.2s ease;
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }

        .btn:hover {
            background: var(--pipe-on);
            color: #000;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.6);
        }

        .btn-danger {
            color: var(--msg-error);
            border-color: var(--msg-error);
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.2);
        }

        .btn-danger:hover {
            background: var(--msg-error);
            box-shadow: 0 0 30px rgba(255, 51, 51, 0.6);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>

<body>
    <div id="app">
        <header>
            <h1>Neon Pipes</h1>
            <div class="hud-group">
                <div id="moves-display" class="level-indicator moves-indicator">Moves: 20</div>
                <div id="level-display" class="level-indicator">Level 1</div>
            </div>
        </header>

        <section id="game-container">
            <div id="grid">
                <!-- Grid items generated by JS -->
            </div>
        </section>

        <!-- Start Screen -->
        <div id="start-screen" class="modal visible">
            <h1 style="font-size: 3rem; margin-bottom: 10px;">NEON PIPES</h1>
            <p>Connect the Magenta Source to the Green Sink.</p>
            <p style="font-size: 0.9rem; color: #888; margin-top: 5px;">Earn medals by saving energy!</p>
            <button id="start-btn" class="btn">Start Game</button>
        </div>

        <!-- Victory Screen -->
        <div id="victory-screen" class="modal">
            <h1 style="color: var(--sink-color);">SYSTEM ONLINE</h1>
            <div id="victory-medal" class="medal-icon"></div>
            <p id="victory-text">Power flow established.</p>
            <div id="victory-moves" style="margin-top: 5px; color: #aaa;"></div>
            <button id="next-level-btn" class="btn">Next Level</button>
        </div>

        <!-- Out of Moves Screen -->
        <div id="game-over-screen" class="modal">
            <h1 style="color: var(--msg-error);">OUT OF ENERGY</h1>
            <p>You ran out of moves.</p>
            <button id="retry-level-btn" class="btn btn-danger">Retry Level</button>
        </div>

        <!-- End Game Screen -->
        <div id="end-screen" class="modal">
            <h1>ALL LEVELS CLEARED</h1>
            <p>You are a master engineer.</p>
            <button id="restart-game-btn" class="btn">Reset System</button>
        </div>
    </div>

            },
            {
                id: 4,
                gridSize: 5,

                layout: [
                    { type: 2, rot: 0, fixed: false }, { type: 5, rot: 0, fixed: false }, { type: 2, rot: 1, fixed: false }, { type: 1, rot: 0, fixed: false }, { type: 2, rot: 2, fixed: false },
                    { type: 1, rot: 1, fixed: false }, { type: 4, rot: 0, fixed: false }, { type: 3, rot: 3, fixed: false }, { type: 3, rot: 1, fixed: false }, { type: 1, rot: 1, fixed: false },
                    { type: 3, rot: 2, fixed: false }, { type: 2, rot: 1, fixed: false }, { type: 4, rot: 0, fixed: false }, { type: 2, rot: 0, fixed: false }, { type: 3, rot: 2, fixed: false },
                    { type: 1, rot: 1, fixed: false }, { type: 3, rot: 1, fixed: false }, { type: 4, rot: 0, fixed: false }, { type: 4, rot: 0, fixed: false }, { type: 1, rot: 1, fixed: false },
                    { type: 2, rot: 3, fixed: false }, { type: 1, rot: 0, fixed: false }, { type: 2, rot: 2, fixed: false }, { type: 6, rot: 0, fixed: false }, { type: 2, rot: 1, fixed: false }
                ]
            },

                layout: [
                    { type: 5, rot: 3, fixed: false }, { type: 1, rot: 1, fixed: false }, { type: 4, rot: 0, fixed: false }, { type: 1, rot: 1, fixed: false }, { type: 2, rot: 2, fixed: false }, { type: 0, rot: 0, fixed: true },
                    { type: 2, rot: 0, fixed: false }, { type: 3, rot: 2, fixed: false }, { type: 2, rot: 3, fixed: false }, { type: 2, rot: 0, fixed: false }, { type: 4, rot: 0, fixed: false }, { type: 2, rot: 3, fixed: false },

                    { type: 0, rot: 0, fixed: true }, { type: 2, rot: 1, fixed: false }, { type: 1, rot: 1, fixed: false }, { type: 2, rot: 2, fixed: false }, { type: 6, rot: 3, fixed: false }, { type: 2, rot: 0, fixed: false }

            },

                    { type: 5, rot: 3, fixed: false }, { type: 1, rot: 1, fixed: false }, { type: 1, rot: 0, fixed: false }, { type: 2, rot: 3, fixed: false }, { type: 4, rot: 0, fixed: false }, { type: 3, rot: 2, fixed: false },
                    { type: 3, rot: 0, fixed: false }, { type: 2, rot: 2, fixed: false }, { type: 1, rot: 1, fixed: false }, { type: 2, rot: 0, fixed: false }, { type: 0, rot: 0, fixed: true }, { type: 1, rot: 1, fixed: false },

                ]
            },
            {

                gridSize: 7,
                maxMoves: 20,
                layout: [
                    { type: 5, rot: 3, fixed: false }, { type: 1, rot: 1, fixed: false }, { type: 1, rot: 1, fixed: false }, { type: 1, rot: 0, fixed: false }, { type: 1, rot: 1, fixed: false }, { type: 1, rot: 0, fixed: false }, { type: 2, rot: 2, fixed: false },
                    { type: 2, rot: 1, fixed: false }, { type: 1, rot: 1, fixed: false }, { type: 1, rot: 0, fixed: false }, { type: 1, rot: 1, fixed: false }, { type: 1, rot: 0, fixed: false }, { type: 1, rot: 1, fixed: false }, { type: 2, rot: 3, fixed: false },

                    { type: 2, rot: 1, fixed: false }, { type: 1, rot: 1, fixed: false }, { type: 1, rot: 0, fixed: false }, { type: 1, rot: 1, fixed: false }, { type: 1, rot: 0, fixed: false }, { type: 1, rot: 1, fixed: false }, { type: 2, rot: 3, fixed: false },
                    { type: 2, rot: 0, fixed: false }, { type: 1, rot: 0, fixed: false }, { type: 1, rot: 1, fixed: false }, { type: 1, rot: 0, fixed: false }, { type: 1, rot: 1, fixed: false }, { type: 1, rot: 0, fixed: false }, { type: 2, rot: 2, fixed: false },
                    { type: 2, rot: 1, fixed: false }, { type: 1, rot: 1, fixed: false }, { type: 1, rot: 0, fixed: false }, { type: 1, rot: 1, fixed: false }, { type: 1, rot: 0, fixed: false }, { type: 1, rot: 1, fixed: false }, { type: 2, rot: 3, fixed: false },
                    { type: 6, rot: 0, fixed: false }, { type: 1, rot: 0, fixed: false }, { type: 1, rot: 1, fixed: false }, { type: 1, rot: 0, fixed: false }, { type: 1, rot: 1, fixed: false }, { type: 1, rot: 0, fixed: false }, { type: 2, rot: 0, fixed: false }
                ]
            }
        ];

        const TILE_TYPES = {
            EMPTY: 0,
            STRAIGHT: 1,
            ELBOW: 2,
            TSHAPE: 3,
            CROSS: 4,
            SOURCE: 5, // Power source
            SINK: 6    // Endpoint
        };

        const CONNECTIONS = {
            [TILE_TYPES.EMPTY]: [0, 0, 0, 0],
            [TILE_TYPES.STRAIGHT]: [1, 0, 1, 0],
            [TILE_TYPES.ELBOW]: [1, 1, 0, 0],
            [TILE_TYPES.TSHAPE]: [1, 1, 1, 0],
            [TILE_TYPES.CROSS]: [1, 1, 1, 1],
            [TILE_TYPES.SOURCE]: [0, 0, 1, 0], // Points Down
            [TILE_TYPES.SINK]: [1, 0, 0, 0]  // Points Up
        };

        class Game {
            constructor() {
                this.currentLevelIndex = 0;
                this.gameState = 'START'; // START, PLAYING, WON, LOST, END
                this.grid = [];
                this.gridSize = 0;
                this.movesLeft = 0;

                // DOM Elements
                this.gridEl = document.getElementById('grid');
                this.levelDisplay = document.getElementById('level-display');
                this.movesDisplay = document.getElementById('moves-display');
                this.startScreen = document.getElementById('start-screen');
                this.victoryScreen = document.getElementById('victory-screen');
                this.gameOverScreen = document.getElementById('game-over-screen');
                this.endScreen = document.getElementById('end-screen');
                this.victoryMovesEl = document.getElementById('victory-moves');
                this.victoryMedalEl = document.getElementById('victory-medal');
                this.victoryTextEl = document.getElementById('victory-text');

                // Buttons
                document.getElementById('start-btn').addEventListener('click', () => this.startGame());
                document.getElementById('next-level-btn').addEventListener('click', () => this.nextLevel());
                document.getElementById('retry-level-btn').addEventListener('click', () => this.restartLevel());
                document.getElementById('restart-game-btn').addEventListener('click', () => this.resetGame());
            }

            resetGame() {
                this.currentLevelIndex = 0;
                this.endScreen.classList.remove('visible');
                this.startGame();
            }

            startGame() {
                this.startScreen.classList.remove('visible');
                this.loadLevel(this.currentLevelIndex);
            }

            restartLevel() {
                this.gameOverScreen.classList.remove('visible');
                this.loadLevel(this.currentLevelIndex);
            }

            loadLevel(index) {
                if (index >= LEVELS.length) {
                    this.showEndScreen();
                    return;
                }

                this.gameState = 'PLAYING';
                this.victoryScreen.classList.remove('visible');
                this.gameOverScreen.classList.remove('visible');

                const levelData = LEVELS[index];
                this.gridSize = levelData.gridSize;
                this.movesLeft = levelData.maxMoves;

                this.levelDisplay.textContent = `Level ${levelData.id}`;
                this.updateMovesDisplay();

                // Update Grid CSS
                this.gridEl.style.gridTemplateColumns = `repeat(${this.gridSize}, 1fr)`;
                this.gridEl.style.gridTemplateRows = `repeat(${this.gridSize}, 1fr)`;
                this.gridEl.innerHTML = '';

                // Clone layout
                this.grid = levelData.layout.map(tile => ({ ...tile, active: false }));

                this.renderGrid();
                this.propagateFlow(); // Check initial state
            }

            updateMovesDisplay() {
                this.movesDisplay.textContent = `Moves: ${this.movesLeft}`;
                if (this.movesLeft <= 5 && this.movesLeft > 0) {
                    this.movesDisplay.classList.add('moves-low');
                } else {
                    this.movesDisplay.classList.remove('moves-low');
                }
            }

            renderGrid() {
                this.gridEl.innerHTML = '';
                this.grid.forEach((tile, index) => {
                    const tileEl = document.createElement('div');
                    tileEl.classList.add('tile');
                    tileEl.dataset.index = index;

                    // Rotation
                    tileEl.style.transform = `rotate(${tile.rot * 90}deg)`;

                    // Visual type classes
                    if (tile.type === TILE_TYPES.SOURCE) tileEl.classList.add('source');
                    if (tile.type === TILE_TYPES.SINK) tileEl.classList.add('sink');
                    if (tile.fixed) tileEl.classList.add('fixed');
                    if (tile.active) tileEl.classList.add('active');

                    // Construct pipe visuals inner HTML
                    this.createPipeVisuals(tileEl, tile.type);

                    // Interaction
                    if (!tile.fixed && tile.type !== TILE_TYPES.EMPTY) {
                        tileEl.addEventListener('click', () => this.rotateTile(index));
                    }

                    this.gridEl.appendChild(tileEl);
                });
            }

            createPipeVisuals(element, type) {
                const conns = CONNECTIONS[type];
                if (!conns) return;

                const [top, right, bottom, left] = conns;

                // Center hub
                if (type !== TILE_TYPES.EMPTY) {
                    const center = document.createElement('div');
                    center.className = 'pipe-part pipe-center';
                    element.appendChild(center);
                }

                if (top) this.addArm(element, 'arm-top');
                if (right) this.addArm(element, 'arm-right');
                if (bottom) this.addArm(element, 'arm-bottom');
                if (left) this.addArm(element, 'arm-left');
            }

            addArm(parent, className) {
                const arm = document.createElement('div');
                arm.className = `pipe-part ${className}`;
                parent.appendChild(arm);
            }

            rotateTile(index) {
                if (this.gameState !== 'PLAYING') return;

                const tile = this.grid[index];

                // Decrement moves
                if (this.movesLeft > 0) {
                    this.movesLeft--;
                    this.updateMovesDisplay();
                } else {
                    return; // Should be handled by game over state
                }

                tile.rot = (tile.rot + 1) % 4;

                // Update DOM transform immediately for performance
                const tileEl = this.gridEl.children[index];
                tileEl.style.transform = `rotate(${tile.rot * 90}deg)`;

                // Recalculate flow
                this.propagateFlow();

                // Check loss condition
                if (this.movesLeft === 0 && this.gameState !== 'WON') {
                    // Need to wait slightly to see if the move won the game
                    setTimeout(() => {
                        if (this.gameState !== 'WON') {
                            this.handleLoss();
                        }
                    }, 350);
                }
            }

            propagateFlow() {
                // Reset active state
                this.grid.forEach(t => t.active = false);

                // Find Source
                let sourceIndex = this.grid.findIndex(t => t.type === TILE_TYPES.SOURCE);
                if (sourceIndex === -1) return;

                // BFS to find all connected pipes
                let queue = [sourceIndex];
                let visited = new Set();
                this.grid[sourceIndex].active = true;
                visited.add(sourceIndex);

                let win = false;

                while (queue.length > 0) {
                    let currIdx = queue.shift();
                    let currTile = this.grid[currIdx];

                    if (currTile.type === TILE_TYPES.SINK) {
                        win = true;
                    }

                    const neighbors = this.getNeighbors(currIdx);

                    neighbors.forEach(n => {
                        if (!visited.has(n.index)) {
                            if (this.canConnect(currIdx, n.index, n.direction)) {
                                this.grid[n.index].active = true;
                                visited.add(n.index);
                                queue.push(n.index);
                            }
                        }
                    });
                }

                this.updateVisuals();

                if (win) {
                    this.gameState = 'WON'; // Set immediately
                    setTimeout(() => this.handleWin(), 300);
                }
            }

            getNeighbors(index) {
                let x = index % this.gridSize;
                let y = Math.floor(index / this.gridSize);
                let neighbors = [];

                // Top
                if (y > 0) neighbors.push({ index: index - this.gridSize, direction: 0 });
                // Right
                if (x < this.gridSize - 1) neighbors.push({ index: index + 1, direction: 1 });
                // Bottom
                if (y < this.gridSize - 1) neighbors.push({ index: index + this.gridSize, direction: 2 });
                // Left
                if (x > 0) neighbors.push({ index: index - 1, direction: 3 });

                return neighbors;
            }

            canConnect(fromIdx, toIdx, direction) {
                const fromTile = this.grid[fromIdx];
                const toTile = this.grid[toIdx];

                const fromConns = this.getRotatedConnections(fromTile.type, fromTile.rot);
                const toConns = this.getRotatedConnections(toTile.type, toTile.rot);

                const oppositeDir = (direction + 2) % 4;

                return fromConns[direction] === 1 && toConns[oppositeDir] === 1;
            }

            getRotatedConnections(type, rot) {
                const original = CONNECTIONS[type];
                const newConns = [0, 0, 0, 0];
                for (let i = 0; i < 4; i++) {
                    newConns[(i + rot) % 4] = original[i];
                }
                return newConns;
            }

            updateVisuals() {
                this.grid.forEach((tile, ctx) => {
                    const el = this.gridEl.children[ctx];
                    if (tile.active) el.classList.add('active');
                    else el.classList.remove('active');
                });
            }

            handleWin() {
                // Calculate Medal
                // Gold: >= 10 moves left (User suggested)
                // Silver: >= 5 moves left
                // Bronze: < 5 moves left

                let medal = '';
                let message = '';
                let medalClass = '';

                if (this.movesLeft >= 10) {
                    medal = '★ GOLD MEDAL ★';
                    message = 'Perfect Execution';
                    medalClass = 'medal-gold';
                } else if (this.movesLeft >= 5) {
                    medal = '★ SILVER MEDAL ★';
                    message = 'Great Efficiency';
                    medalClass = 'medal-silver';
                } else {
                    medal = '★ BRONZE MEDAL ★';
                    message = 'Mission Accomplished';
                    medalClass = 'medal-bronze';
                }

                this.victoryMedalEl.textContent = medal;
                this.victoryMedalEl.className = 'medal-icon ' + medalClass;
                this.victoryTextEl.textContent = message;
                this.victoryMovesEl.textContent = `Remaining moves: ${this.movesLeft}`;

                this.victoryScreen.classList.add('visible');
            }

            handleLoss() {
                this.gameState = 'LOST';
                this.gameOverScreen.classList.add('visible');
            }

            nextLevel() {
                this.currentLevelIndex++;
                this.loadLevel(this.currentLevelIndex);
            }

            showEndScreen() {
                this.endScreen.classList.add('visible');
            }
        }

        new Game();
    </script>
